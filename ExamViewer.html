<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>歷屆測驗題庫查詢系統</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            line-height: 1.6;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .flex-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="file"], select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 16px;
        }
        .encoding-select {
            width: auto;
            min-width: 150px;
            background-color: #fdfdfd;
        }
        button {
            background-color: #3498db;
            color: white;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            width: 100%;
            transition: background-color 0.3s;
            font-weight: bold;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-box {
            background-color: #e8f4f8;
            padding: 20px;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            margin-top: 20px;
            display: none;
        }
        .question-text {
            font-size: 18px;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        .answer-text {
            font-size: 18px;
            font-weight: bold;
            color: #e74c3c;
        }
        .status {
            margin-top: 10px;
            font-weight: bold;
            font-size: 15px;
        }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .hint { font-size: 13px; color: #7f8c8d; margin-top: 5px;}
    </style>
</head>
<body>

    <h1>歷屆測驗題庫查詢系統</h1>

    <div class="container">
        <div class="form-group">
            <label>1. 上傳題庫檔案與編碼設定：</label>
            <div class="flex-row">
                <input type="file" id="fileInput" accept=".txt" multiple>
                <select id="encodingSelect" class="encoding-select" title="若出現亂碼請切換此選項">
                    <option value="UTF-8">UTF-8 (預設)</option>
                    <option value="Big5">Big5 (ANSI)</option>
                </select>
            </div>
            <div class="hint">💡 提示：如果上傳後查詢出來的文字是亂碼（出現菱形問號），請直接切換右側的編碼，無需重新上傳檔案。</div>
            <div id="uploadStatus" class="status"></div>
        </div>

        <div class="form-group">
            <label for="yearSelect">2. 選擇年份：</label>
            <select id="yearSelect">
                <option value="">請先上傳檔案...</option>
            </select>
        </div>

        <div class="form-group">
            <label for="questionNum">3. 輸入題號 (按 Enter 直接查詢)：</label>
            <input type="number" id="questionNum" min="1" placeholder="例如輸入 1 後按下 Enter">
        </div>

        <button id="searchBtn">查詢題目與答案</button>
    </div>

    <div id="resultBox" class="result-box">
        <div class="question-text" id="questionDisplay"></div>
        <hr>
        <div class="answer-text" id="answerDisplay"></div>
    </div>

    <script>
        let examData = {};
        let currentFiles = []; 

        // 監聽檔案上傳
        document.getElementById('fileInput').addEventListener('change', function(e) {
            currentFiles = Array.from(e.target.files);
            processFiles();
        });

        // 監聽編碼切換
        document.getElementById('encodingSelect').addEventListener('change', function() {
            if (currentFiles.length > 0) {
                processFiles();
                if (document.getElementById('resultBox').style.display === 'block') {
                    document.getElementById('searchBtn').click();
                }
            }
        });

        // 解析檔案的主函數
        function processFiles() {
            if (currentFiles.length === 0) return;

            examData = {}; 
            let filesProcessed = 0;
            let successCount = 0;
            const encoding = document.getElementById('encodingSelect').value;

            currentFiles.forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const text = event.target.result;
                    const isSuccess = parseExamText(file.name, text);
                    if (isSuccess) successCount++;
                    
                    filesProcessed++;
                    if (filesProcessed === currentFiles.length) {
                        updateYearSelect();
                        const statusDiv = document.getElementById('uploadStatus');
                        if (successCount > 0) {
                            statusDiv.innerText = `✅ 成功解析 ${successCount} 個檔案！(目前編碼: ${encoding})`;
                            statusDiv.className = "status success";
                        } else {
                            statusDiv.innerText = `❌ 解析失敗。如果是亂碼，請嘗試切換上方的編碼選項。`;
                            statusDiv.className = "status error";
                        }
                    }
                };
                reader.readAsText(file, encoding);
            });
        }

        // 解析題庫文字內容
        function parseExamText(filename, text) {
            text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');

            let year = "未知年份";
            const yearMatch = filename.match(/(\d{3})/);
            if (yearMatch) {
                year = yearMatch[1];
            }

            let splitIndex = text.lastIndexOf("答案\n");
            if (splitIndex === -1) splitIndex = text.lastIndexOf("解答\n");
            if (splitIndex === -1) splitIndex = text.indexOf("\n1-10"); 
            if (splitIndex === -1) return false;

            let qText = text.substring(0, splitIndex);
            let aText = text.substring(splitIndex);

            let questions = {};
            let answers = {};

            let currentQNum = null;
            let currentQLines = [];
            const qLines = qText.split('\n');

            for (let line of qLines) {
                const m = line.match(/^\s*(\d+)[\s\.、]+(.*)/);
                if (m) {
                    if (currentQNum) questions[currentQNum] = currentQLines.join('\n').trim();
                    currentQNum = m[1];
                    currentQLines = [m[2]];
                } else if (currentQNum && line.trim() !== "" && !line.includes("題目")) {
                    currentQLines.push(line.trim());
                }
            }
            if (currentQNum) questions[currentQNum] = currentQLines.join('\n').trim();

            const aLines = aText.split('\n');
            for (let line of aLines) {
                const am = line.match(/(\d+)\s*[-~]\s*\d+\s*[:：]\s*(.+)/);
                if (am) {
                    const startNum = parseInt(am[1]);
                    const ansStr = am[2];
                    const ansArr = ansStr.split(/[,、]/).map(x => x.trim()).filter(x => x);
                    
                    for (let i = 0; i < ansArr.length; i++) {
                        answers[startNum + i] = ansArr[i];
                    }
                }
            }

            if (Object.keys(questions).length > 0) {
                examData[year] = { questions, answers };
                return true;
            }
            return false;
        }

        // 更新下拉選單年份
        function updateYearSelect() {
            const select = document.getElementById('yearSelect');
            select.innerHTML = '';
            
            const years = Object.keys(examData).sort((a, b) => b - a); 
            
            if (years.length === 0) {
                select.innerHTML = '<option value="">請先上傳正確格式的檔案...</option>';
                return;
            }

            years.forEach(year => {
                const option = document.createElement('option');
                option.value = year;
                option.textContent = year + " 年";
                select.appendChild(option);
            });
        }

        // 執行查詢功能
        function performSearch() {
            const year = document.getElementById('yearSelect').value;
            const qNum = document.getElementById('questionNum').value;
            const resultBox = document.getElementById('resultBox');
            const qDisplay = document.getElementById('questionDisplay');
            const aDisplay = document.getElementById('answerDisplay');

            if (!year || !qNum) {
                alert('請確認已成功載入檔案，並輸入要查詢的題號！');
                return;
            }

            const yearData = examData[year];
            if (!yearData) return;

            const questionText = yearData.questions[qNum];
            const answerText = yearData.answers[qNum];

            resultBox.style.display = 'block';

            if (questionText) {
                qDisplay.innerText = `第 ${qNum} 題：\n${questionText}`;
                aDisplay.innerText = `標準答案：${answerText || '查無此題答案'}`;
            } else {
                qDisplay.innerText = `⚠️ 在 ${year} 年的題庫中找不到第 ${qNum} 題。請確認題號是否輸入正確。`;
                aDisplay.innerText = '';
            }
        }

        // 監聽查詢按鈕點擊
        document.getElementById('searchBtn').addEventListener('click', performSearch);

        // ★ 新增功能：監聽輸入框的 Enter 鍵
        document.getElementById('questionNum').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault(); // 避免觸發其他預設行為
                performSearch();    // 執行查詢
            }
        });
    </script>
</body>
</html>
